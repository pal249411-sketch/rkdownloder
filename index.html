<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="tbpbgBYZYQyzrlFcO_bOuJjqhK1Cim5Yg0LW7ETz3Ks" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold & Silver Calculator</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #111827, #030712);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calc-wrapper {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 25px;
            border-radius: 24px;
            width: 90%; max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        h2 { font-size: 2rem; margin: 0 0 5px 0; color: #d4af37; text-align: center; }
        .tagline { display: block; font-size: 0.85rem; color: #9ca3af; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.95rem; margin-bottom: 8px; color: #e5e7eb; font-weight: 500; }
        input, select {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 1px solid #4b5563; background: rgba(0,0,0,0.4);
            color: #fff; font-size: 1rem; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .radio-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-weight: bold; }
        .radio-btn input { width: auto; margin: 0; cursor: pointer; }
        .radio-btn.active { border-color: #d4af37; background: rgba(212, 175, 55, 0.1); color: #d4af37; }

        .result-box {
            background: rgba(212, 175, 55, 0.08); border: 1px dashed #d4af37;
            padding: 20px; border-radius: 16px; margin-top: 25px; text-align: left;
        }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; color: #d1d5db; }
        .res-line.total { border-top: 1px solid rgba(212,175,55,0.3); padding-top: 12px; margin-top: 5px; font-size: 1.3rem; font-weight: bold; color: #d4af37; }
    </style>
</head>
<body>

    <div class="calc-wrapper">
        <h2>Gold &amp; Silver Calculator</h2>
        <span class="tagline">Sahi Rate Janiye, Dukan Par Dhokha Se Bachiye</span>
        
        <div class="radio-group">
            <div class="radio-btn active" id="goldTab" onclick="switchMetal('gold')">
                <input type="radio" name="metal" value="gold" checked style="display:none;"> ✨ Gold
            </div>
            <div class="radio-btn" id="silverTab" onclick="switchMetal('silver')">
                <input type="radio" name="metal" value="silver" style="display:none;"> 🪙 Silver
            </div>
        </div>

        <div class="input-group" id="caratGroup">
            <label for="carat">Carat Select Karein</label>
            <select id="carat" onchange="calculateBill()">
                <option value="24">24 Carat (Pure Gold)</option>
                <option value="22" selected>22 Carat (Jewellery Gold - 916)</option>
                <option value="18">18 Carat (Diamond Jewellery)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="liveRate" id="rateLabel">Aaj Ka Gold Rate (Per 10 Gram)</label>
            <input type="number" id="liveRate" placeholder="Jaise: 72000" oninput="calculateBill()">
        </div>

        <div class="input-group">
            <label for="weight">Jewellery Ka Wazan (Grams Mein)</label>
            <input type="number" id="weight" step="0.001" placeholder="Jaise: 8.500" oninput="calculateBill()">
        </div>

        <div class="input-group">
            <label for="makingCharges">Making Charges (Per Gram ₹)</label>
            <input type="number" id="makingCharges" value="350" placeholder="Jaise: 350" oninput="calculateBill()">
        </div>

        <div class="result-box">
            <div class="res-line"><span>Raw Metal Price:</span> <span id="rawPrice">₹0.00</span></div>
            <div class="res-line"><span>Making Charges:</span> <span id="totalMaking">₹0.00</span></div>
            <div class="res-line"><span>GST (3%):</span> <span id="gstAmount">₹0.00</span></div>
            <div class="res-line total"><span>Final Net Price:</span> <span id="finalTotal">₹0.00</span></div>
        </div>
    </div>

    <script>
        let currentMetal = 'gold';

        function switchMetal(metal) {
            currentMetal = metal;
            document.getElementById('goldTab').classList.remove('active');
            document.getElementById('silverTab').classList.remove('active');
            
            if(metal === 'gold') {
                document.getElementById('goldTab').classList.add('active');
                document.getElementById('caratGroup').style.display = 'block';
                document.getElementById('rateLabel').innerText = "Aaj Ka Gold Rate (Per 10 Gram)";
                document.getElementById('liveRate').placeholder = "Jaise: 72000";
            } else {
                document.getElementById('silverTab').classList.add('active');
                document.getElementById('caratGroup').style.display = 'none';
                document.getElementById('rateLabel').innerText = "Aaj Ka Silver Rate (Per 1 KG / 1000 Gram)";
                document.getElementById('liveRate').placeholder = "Jaise: 85000";
            }
            calculateBill();
        }

        function calculateBill() {
            const rate = parseFloat(document.getElementById('liveRate').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const making = parseFloat(document.getElementById('makingCharges').value) || 0;
            const carat = parseFloat(document.getElementById('carat').value) || 24;

            let basePricePerGram = 0;

            if (currentMetal === 'gold') {
                let pureGramPrice = rate / 10;
                if(carat === 22) {
                    basePricePerGram = pureGramPrice * (22 / 24);
                } else if(carat === 18) {
                    basePricePerGram = pureGramPrice * (18 / 24);
                } else {
                    basePricePerGram = pureGramPrice;
                }
            } else {
                basePricePerGram = rate / 1000;
            }

            let rawPrice = basePricePerGram * weight;
            let totalMaking = making * weight;
            let beforeGst = rawPrice + totalMaking;
            let gstAmount = beforeGst * 0.03;
            let finalTotal = beforeGst + gstAmount;

            document.getElementById('rawPrice').innerText = "₹" + rawPrice.toFixed(2);
            document.getElementById('totalMaking').innerText = "₹" + totalMaking.toFixed(2);
            document.getElementById('gstAmount').innerText = "₹" + gstAmount.toFixed(2);
            document.getElementById('finalTotal').innerText = "₹" + finalTotal.toFixed(2);
        }
    </script>
</body>
</html>
