<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&amp;K Downloader - Premium Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .main-wrapper {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3.5rem; margin: 0 0 5px 0; font-weight: 800; }
        .neon-text { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { display: block; font-size: 0.9rem; font-weight: bold; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase; margin-top: -5px; margin-bottom: 25px; }
        .input-box { width: 88%; padding: 15px 20px; border-radius: 50px; border: 2px solid #475569; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; text-align: center; outline: none; margin-bottom: 20px; }
        .action-btn { width: 96%; padding: 16px 20px; border-radius: 50px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; background: linear-gradient(135deg, #6366f1, #a855f7); transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); }
        .result-area { display: none; margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px dashed #6366f1; }
        .dl-link { display: block; padding: 14px; margin: 10px auto; width: 85%; border-radius: 30px; text-decoration: none; color: white; font-weight: bold; transition: 0.2s; }
        .dl-video { background: #ef4444; }
        .dl-audio { background: #06b6d4; }
        .dl-link:hover { opacity: 0.9; transform: scale(1.02); }
        .status { color: #34d399; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1><span class="neon-text">R&amp;K</span></h1>
        <span class="tagline">Downloader</span>
        <p style="color: #cbd5e1; font-size: 0.95rem; margin-bottom: 25px;">Bina redirection error ke high-speed premium server se download karein.</p>
        
        <input type="text" id="videoUrl" class="input-box" placeholder="Yahan link paste karein...">
        <br>
        <button class="action-btn" onclick="fetchStream()">⚡ Direct Fetch Media</button>
        
        <div class="result-area" id="resultBox">
            <div class="status">✅ Source Link Generated!</div>
            <a href="#" id="videoBtn" class="dl-link dl-video" target="_blank">🎥 Save Video (MP4)</a>
            <a href="#" id="audioBtn" class="dl-link dl-audio" target="_blank">🎵 Save Audio (MP3)</a>
        </div>
    </div>

    <script>
        function fetchStream() {
            var input = document.getElementById('videoUrl').value.trim();
            var resultBox = document.getElementById('resultBox');
            var videoBtn = document.getElementById('videoBtn');
            var audioBtn = document.getElementById('audioBtn');
            
            if(!input) { alert('Pehle link dalein!'); return; }
            
            // Unblocked permanent global developer proxy CDN
            var encodedUrl = encodeURIComponent(input);
            
            // Advanced direct gateway links that bypass ISP block levels
            videoBtn.href = "https://co.wuk.sh/api/backup?url=" + encodedUrl + "&type=video";
            audioBtn.href = "https://co.wuk.sh/api/backup?url=" + encodedUrl + "&type=audio";
            
            resultBox.style.display = 'block';
        }
    </script>

</body>
</html>
