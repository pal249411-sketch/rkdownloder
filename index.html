<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&amp;K Downloader - Premium Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .main-wrapper {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3.5rem; margin: 0 0 5px 0; font-weight: 800; }
        .neon-text { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { display: block; font-size: 0.9rem; font-weight: bold; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase; margin-top: -5px; margin-bottom: 25px; }
        .input-box { width: 88%; padding: 15px 20px; border-radius: 50px; border: 2px solid #475569; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; text-align: center; outline: none; margin-bottom: 20px; }
        .action-btn { width: 96%; padding: 16px 20px; border-radius: 50px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; background: linear-gradient(135deg, #6366f1, #a855f7); transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); }
        .status { margin-top: 20px; font-weight: bold; color: #34d399; display: none; line-height: 1.5; }
        .video-preview { width: 100%; max-height: 250px; margin-top: 15px; border-radius: 12px; display: none; border: 1px solid rgba(255,255,255,0.2); }
        .save-btn { display: none; width: 96%; padding: 14px 20px; margin-top: 15px; background: #22c55e; color: white; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1><span class="neon-text">R&amp;K</span></h1>
        <span class="tagline">Downloader</span>
        <p style="color: #cbd5e1; font-size: 0.95rem; margin-bottom: 25px;">Isi page par instant download karein.</p>
        
        <input type="text" id="videoUrl" class="input-box" placeholder="Yahan link paste karein...">
        <br>
        <button class="action-btn" id="dlBtn" onclick="processDownload()">⚡ Download Media</button>
        
        <div class="status" id="statusBox">⏳ Loading...</div>
        <video id="player" class="video-preview" controls></video>
        <a href="#" id="finalSave" class="save-btn" download="RK_Media.mp4">📥 Save to Device</a>
    </div>

    <script>
        async function processDownload() {
            var input = document.getElementById('videoUrl').value.trim();
            var statusBox = document.getElementById('statusBox');
            var btn = document.getElementById('dlBtn');
            var player = document.getElementById('player');
            var saveBtn = document.getElementById('finalSave');
            
            if(!input) { alert('Pehle link dalein!'); return; }
            
            statusBox.style.display = 'block';
            statusBox.style.color = '#e2e8f0';
            statusBox.innerText = "⏳ Fetching video from unblocked stream network...";
            btn.disabled = true;
            player.style.display = "none";
            saveBtn.style.display = "none";

            try {
                // Using updated unblocked modern main dynamic cobalt gateway endpoint
                let response = await fetch("https://cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: input })
                });
                
                let data = await response.json();
                
                if(data.url) {
                    statusBox.style.color = '#34d399';
                    statusBox.innerText = "✅ File Generated! Niche click karke save karein:";
                    
                    // Injecting source directly to player and save button inside same webpage context
                    player.src = data.url;
                    player.style.display = "block";
                    
                    saveBtn.href = data.url;
                    saveBtn.style.display = "inline-block";
                } else {
                    throw new Error();
                }
            } catch (err) {
                statusBox.style.color = '#f87171';
                statusBox.innerText = "❌ Ye URL abhi secure data response nahi de raha hai. Kripya doosri video link try karein.";
            }
            btn.disabled = false;
        }
    </script>

</body>
</html>
