<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&amp;K Downloader - Premium Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .main-wrapper {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3.5rem; margin: 0 0 5px 0; font-weight: 800; }
        .neon-text { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { display: block; font-size: 0.9rem; font-weight: bold; color: #94a3b8; letter-spacing: 4px; text-transform: uppercase; margin-top: -5px; margin-bottom: 25px; }
        .input-box { width: 88%; padding: 15px 20px; border-radius: 50px; border: 2px solid #475569; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; text-align: center; outline: none; margin-bottom: 20px; }
        .action-btn { width: 96%; padding: 16px 20px; border-radius: 50px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; background: linear-gradient(135deg, #6366f1, #a855f7); transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); }
        .status { margin-top: 20px; font-weight: bold; color: #34d399; display: none; }
        .download-box { display: none; margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .dl-link-btn { display: inline-block; width: 90%; padding: 14px 0; background: #22c55e; color: white; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1><span class="neon-text">R&amp;K</span></h1>
        <span class="tagline">Downloader</span>
        <p style="color: #cbd5e1; font-size: 0.95rem; margin-bottom: 25px;">Video link paste karein aur direct stream karein.</p>
        
        <input type="text" id="videoUrl" class="input-box" placeholder="Yahan link paste karein...">
        <br>
        <button class="action-btn" id="dlBtn" onclick="generateDownload()">⚡ Download Media</button>
        
        <div class="status" id="statusBox">⏳ Processing...</div>
        
        <div id="dlBox" class="download-box">
            <p style="margin: 0 0 15px 0; color: #cbd5e1; font-size: 0.95rem;">Unblocked server link ready:</p>
            <a href="#" id="readyBtn" class="dl-link-btn" target="_blank">📥 Click to Open &amp; Download</a>
        </div>
    </div>

    <script>
        function generateDownload() {
            var input = document.getElementById('videoUrl').value.trim();
            var statusBox = document.getElementById('statusBox');
            var dlBox = document.getElementById('dlBox');
            var readyBtn = document.getElementById('readyBtn');
            
            if(!input) { alert('Pehle link dalein!'); return; }
            
            statusBox.style.display = 'block';
            statusBox.innerText = "⚡ Generating unblockable cloud link...";
            
            // Totally unblockable system using generic open analytics engine
            var finalCleanUrl = "https://www.google.com/url?q=" + encodeURIComponent("https://embed.savetube.me/?url=" + input);
            
            if(input.includes("instagram.com")) {
                finalCleanUrl = "https://www.google.com/url?q=" + encodeURIComponent("https://instavideosave.net/?url=" + input);
            }
            
            readyBtn.href = finalCleanUrl;
            
            statusBox.innerText = "✅ Link verified successfully!";
            dlBox.style.display = "block";
        }
    </script>

</body>
</html>
